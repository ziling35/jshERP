name: Sync Upstream

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）自动执行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持在 GitHub 页面手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/jishenghua/jshERP.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/master
        id: merge
        run: |
          if git merge upstream/master --no-edit; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.merge.outputs.status == 'success'
        run: git push origin master

      - name: Create issue on conflict
        if: steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 上游同步失败 - 存在合并冲突',
              body: `自动同步上游仓库 \`jishenghua/jshERP\` 时发现合并冲突。\n\n请手动解决冲突后合并：\n\`\`\`bash\ngit fetch upstream\ngit merge upstream/master\n# 解决冲突后\ngit add .\ngit commit\ngit push origin master\n\`\`\`\n\n运行时间: ${new Date().toISOString()}`,
              labels: ['sync-conflict']
            });
